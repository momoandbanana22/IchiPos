name: Release

# 本番リリース。手順は release-core.yml（共通ワークフロー）に集約している（SSoT, #76）。
# ここは「タグ push / 手動実行を受けて、本番モード（dry_run=false）で core を呼ぶ」だけ。
on:
  push:
    tags:
      - 'v*'
  # タグを打ち直さずにリリースをやり直すための手動トリガー（#41）。
  # 実行時はタグを ref に指定する: gh workflow run release.yml --ref vX.Y.Z
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    uses: ./.github/workflows/release-core.yml
    with:
      dry_run: false
      release_tag: ${{ github.ref_name }}
