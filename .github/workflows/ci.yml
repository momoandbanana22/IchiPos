name: CI

# テストがタグpush時のリリース処理（release.yml）でしか実行されておらず、
# 変更時点でテストの不足・失敗に気づけなかったため、PR・mainへのpushでも実行する。
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Test
        run: dotnet test --configuration Release --logger "console;verbosity=normal"
